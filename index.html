<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free AWS CLF-C02 Practice Exam | Cloud Practitioner Prep</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
    :root {
      --aws-orange: #FF9900;
      --aws-dark: #0F1923;
      --aws-navy: #152535;
      --aws-card: #1A2F45;
      --aws-border: #1E3A52;
      --aws-blue: #00A8E1;
      --success: #22C55E;
      --danger: #EF4444;
      --warning: #F59E0B;
      --text-muted: #8BA4B8;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--aws-dark); }
    ::-webkit-scrollbar-thumb { background: var(--aws-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--aws-blue); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 0 0 rgba(255,153,0,0.3); } 50% { box-shadow: 0 0 0 8px rgba(255,153,0,0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes countdown { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 283; } }
    @keyframes bounce-in { 0% { transform: scale(0.8); opacity:0; } 60% { transform: scale(1.05); } 100% { transform: scale(1); opacity:1; } }
    @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes progress-fill { from { width: 0%; } to { width: var(--target-width); } }

    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .slide-in { animation: slideInLeft 0.3s ease forwards; }
    .bounce-in { animation: bounce-in 0.5s cubic-bezier(.36,.07,.19,.97) forwards; }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .spin-anim { animation: spin 1s linear infinite; }

    /* Landing page */
    .hero-bg {
      background: linear-gradient(135deg, #0F1923 0%, #152535 40%, #0F1923 100%);
      position: relative;
      overflow: hidden;
    }
    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 30%, rgba(255,153,0,0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 20% 70%, rgba(0,168,225,0.06) 0%, transparent 70%);
    }
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,153,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,153,0,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .stat-card {
      background: rgba(26,47,69,0.6);
      border: 1px solid rgba(255,153,0,0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: rgba(255,153,0,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .resource-card {
      background: rgba(26,47,69,0.5);
      border: 1px solid rgba(30,58,82,0.8);
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .resource-card:hover {
      border-color: rgba(0,168,225,0.4);
      background: rgba(26,47,69,0.8);
    }
    .start-btn {
      background: linear-gradient(135deg, #FF9900, #FFB84D);
      color: #0F1923;
      font-weight: 800;
      border: none;
      cursor: pointer;
      border-radius: 14px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(255,153,0,0.4); }
    .start-btn:hover::before { opacity: 1; }
    .start-btn:active { transform: translateY(0); }

    /* Domain badge */
    .domain-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }
    .d1 { background: rgba(0,168,225,0.15); color: #00A8E1; border: 1px solid rgba(0,168,225,0.3); }
    .d2 { background: rgba(239,68,68,0.12); color: #F87171; border: 1px solid rgba(239,68,68,0.25); }
    .d3 { background: rgba(34,197,94,0.12); color: #4ADE80; border: 1px solid rgba(34,197,94,0.25); }
    .d4 { background: rgba(245,158,11,0.12); color: #FCD34D; border: 1px solid rgba(245,158,11,0.3); }

    /* Quiz option */
    .quiz-option {
      background: rgba(26,47,69,0.5);
      border: 2px solid rgba(30,58,82,0.8);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .quiz-option:hover:not(.answered) {
      border-color: rgba(255,153,0,0.5);
      background: rgba(26,47,69,0.9);
      transform: translateX(4px);
    }
    .quiz-option.selected {
      border-color: #FF9900;
      background: rgba(255,153,0,0.08);
    }
    .quiz-option.correct {
      border-color: #22C55E;
      background: rgba(34,197,94,0.08);
    }
    .quiz-option.incorrect {
      border-color: #EF4444;
      background: rgba(239,68,68,0.08);
    }
    .quiz-option.correct-answer {
      border-color: #22C55E;
      background: rgba(34,197,94,0.1);
    }

    /* Sidebar nav bubble */
    .q-bubble {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }
    .q-bubble:hover { transform: scale(1.1); }
    .q-bubble.unanswered { background: rgba(30,58,82,0.8); color: #8BA4B8; border-color: rgba(30,58,82,0.8); }
    .q-bubble.answered { background: rgba(255,153,0,0.2); color: #FF9900; border-color: rgba(255,153,0,0.4); }
    .q-bubble.current { background: #FF9900; color: #0F1923; border-color: #FF9900; }
    .q-bubble.flagged { background: rgba(245,158,11,0.2); color: #F59E0B; border-color: rgba(245,158,11,0.5); }
    .q-bubble.review-correct { background: rgba(34,197,94,0.2); color: #22C55E; border-color: rgba(34,197,94,0.4); }
    .q-bubble.review-incorrect { background: rgba(239,68,68,0.2); color: #EF4444; border-color: rgba(239,68,68,0.4); }

    /* Timer */
    .timer-ring {
      transition: stroke-dashoffset 1s linear;
    }
    .timer-warning { color: #F59E0B; }
    .timer-danger { color: #EF4444; }
    .timer-danger-pulse { animation: pulse-glow 1.5s infinite; border-radius: 999px; }

    /* Progress bar */
    .progress-bar-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 1s ease;
    }

    /* Results */
    .score-ring-container { position: relative; display: inline-flex; align-items: center; justify-content: center; }
    .result-tab { padding: 10px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .result-tab.active { background: rgba(255,153,0,0.15); color: #FF9900; border-bottom: 2px solid #FF9900; }
    .result-tab.inactive { color: #8BA4B8; }
    .result-tab:hover:not(.active) { color: #e0e0e0; }

    /* Explanation box */
    .explanation-box {
      background: rgba(0,168,225,0.06);
      border-left: 3px solid #00A8E1;
      border-radius: 0 8px 8px 0;
    }

    /* Review answer card */
    .review-card {
      background: rgba(26,47,69,0.4);
      border: 1px solid rgba(30,58,82,0.8);
      border-radius: 14px;
      transition: all 0.3s;
    }
    .review-card:hover { border-color: rgba(255,153,0,0.2); }

    /* Shimmer loading */
    .shimmer {
      background: linear-gradient(90deg, rgba(26,47,69,0.3) 25%, rgba(30,58,82,0.5) 50%, rgba(26,47,69,0.3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar-mobile { display: none; }
      .sidebar-mobile.open { display: block; }
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Tooltip */
    .tooltip { position: relative; }
    .tooltip:hover .tooltip-text { opacity: 1; visibility: visible; }
    .tooltip-text {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26,47,69,0.95);
      color: #e0e0e0;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
      pointer-events: none;
      border: 1px solid rgba(30,58,82,0.8);
      z-index: 100;
    }

    .aws-logo-text {
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
    }
  </style>
</head>
<body style="background:#0F1923; color:#E8F0F7; min-height:100vh;">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─────────────────────────────────────────────
// QUESTION DATA — 100 questions across 4 domains
// ─────────────────────────────────────────────
const ALL_QUESTIONS = [
  // ───── DOMAIN 1: Cloud Concepts (26%) ─────
  { id:1, domain:"D1", domainName:"Cloud Concepts", question:"Which of the following best describes the AWS Cloud's scalability benefit?", options:["The ability to resize resources as needed","Pre-purchasing maximum capacity","Fixed server capacity planning","Manual hardware procurement"], answer:0, explanation:"Scalability in AWS means you can resize resources up or down based on demand, eliminating the need to over-provision. This is a key benefit of cloud computing." },
  { id:2, domain:"D1", domainName:"Cloud Concepts", question:"What is the AWS shared responsibility model?", options:["AWS manages all security","Customers manage all security","Security responsibilities are divided between AWS and the customer","Security is optional in AWS"], answer:2, explanation:"The shared responsibility model divides security: AWS secures the infrastructure (security OF the cloud), while customers secure what they put in the cloud (security IN the cloud)." },
  { id:3, domain:"D1", domainName:"Cloud Concepts", question:"Which cloud deployment model runs infrastructure exclusively on-premises using cloud technologies?", options:["Public cloud","Hybrid cloud","Private cloud","Community cloud"], answer:2, explanation:"A private cloud runs cloud infrastructure exclusively for a single organization, either managed internally or by a third party, and may exist on-premises." },
  { id:4, domain:"D1", domainName:"Cloud Concepts", question:"A company wants to move its application to AWS to reduce upfront capital expenditure. What benefit does this represent?", options:["High availability","Trade fixed expense for variable expense","Economies of scale","Global reach"], answer:1, explanation:"Moving to AWS lets companies trade capital expenses (CapEx) for variable operational expenses (OpEx), paying only for what they use." },
  { id:5, domain:"D1", domainName:"Cloud Concepts", question:"Which AWS service provides a managed relational database?", options:["Amazon DynamoDB","Amazon RDS","Amazon Redshift","Amazon ElastiCache"], answer:1, explanation:"Amazon RDS (Relational Database Service) is a managed service for relational databases supporting MySQL, PostgreSQL, Oracle, SQL Server, and MariaDB." },
  { id:6, domain:"D1", domainName:"Cloud Concepts", question:"What does 'elasticity' mean in the context of AWS?", options:["Permanent capacity expansion","The ability to scale resources up and down automatically based on demand","Manually adding servers","Fixed infrastructure planning"], answer:1, explanation:"Elasticity refers to the ability to automatically scale resources up during peak demand and scale down when demand decreases, optimizing costs." },
  { id:7, domain:"D1", domainName:"Cloud Concepts", question:"Which of the following is NOT a characteristic of cloud computing according to NIST?", options:["On-demand self-service","Broad network access","Dedicated physical servers for each customer","Rapid elasticity"], answer:2, explanation:"NIST's 5 cloud characteristics are: on-demand self-service, broad network access, resource pooling, rapid elasticity, and measured service. Dedicated physical servers for each customer describes bare-metal, not cloud." },
  { id:8, domain:"D1", domainName:"Cloud Concepts", question:"What is a major advantage of using AWS's global infrastructure?", options:["Single region deployment only","Low latency delivery to users worldwide","Higher hardware costs","Manual failover only"], answer:1, explanation:"AWS's global infrastructure spans multiple regions and edge locations, enabling low-latency delivery to users worldwide and geographic redundancy." },
  { id:9, domain:"D1", domainName:"Cloud Concepts", question:"Which AWS architecture principle recommends designing systems to handle failure?", options:["Design for failure","Monolithic architecture","Single point of success","Avoid redundancy"], answer:0, explanation:"'Design for failure' is a core AWS Well-Architected principle — assume components will fail and design systems that can automatically recover." },
  { id:10, domain:"D1", domainName:"Cloud Concepts", question:"What is the benefit of AWS Availability Zones?", options:["They are separate geographic regions","They provide high availability within a region by isolating failures","They are used only for data archival","They replace the need for backups"], answer:1, explanation:"Availability Zones are isolated locations within an AWS Region with independent power, cooling, and networking, enabling high availability and fault tolerance." },
  { id:11, domain:"D1", domainName:"Cloud Concepts", question:"Which term describes paying only for the computing resources you consume?", options:["Reserved pricing","On-demand pricing","Spot pricing","Pay-as-you-go"], answer:3, explanation:"Pay-as-you-go is the AWS pricing model where you pay only for the resources you actually use, with no upfront commitments required." },
  { id:12, domain:"D1", domainName:"Cloud Concepts", question:"What does AWS mean by 'economies of scale'?", options:["AWS charges more for large workloads","AWS passes cost savings from operating at massive scale to customers","Each customer builds their own data center","Costs increase with usage"], answer:1, explanation:"Because AWS serves millions of customers, it achieves much lower variable costs than any individual organization could on its own, passing these savings to customers." },
  { id:13, domain:"D1", domainName:"Cloud Concepts", question:"Which AWS Well-Architected pillar focuses on the ability to run and monitor systems to deliver business value?", options:["Security","Reliability","Operational Excellence","Performance Efficiency"], answer:2, explanation:"The Operational Excellence pillar focuses on running and monitoring systems to deliver business value, and continuously improving processes and procedures." },
  { id:14, domain:"D1", domainName:"Cloud Concepts", question:"What is Amazon CloudFront?", options:["A database service","A content delivery network (CDN)","A compute service","A storage service"], answer:1, explanation:"Amazon CloudFront is a fast content delivery network (CDN) that securely delivers data, videos, applications, and APIs to customers globally with low latency." },
  { id:15, domain:"D1", domainName:"Cloud Concepts", question:"Which cloud computing service model provides virtualized computing resources over the internet?", options:["SaaS","PaaS","IaaS","FaaS"], answer:2, explanation:"Infrastructure as a Service (IaaS) provides virtualized computing resources including servers, storage, and networking over the internet." },
  { id:16, domain:"D1", domainName:"Cloud Concepts", question:"A company uses AWS for development and testing while keeping production workloads on-premises. Which deployment model is this?", options:["Public cloud","Private cloud","Hybrid cloud","Multi-cloud"], answer:2, explanation:"A hybrid cloud combines on-premises infrastructure with public cloud services, allowing data and applications to be shared between them." },
  { id:17, domain:"D1", domainName:"Cloud Concepts", question:"Which of the following is an example of a Platform as a Service (PaaS)?", options:["Amazon EC2","AWS Elastic Beanstalk","Amazon S3","Amazon VPC"], answer:1, explanation:"AWS Elastic Beanstalk is a PaaS that handles infrastructure provisioning, load balancing, auto-scaling, and monitoring, letting you focus on your application code." },
  { id:18, domain:"D1", domainName:"Cloud Concepts", question:"What does AWS Global Accelerator do?", options:["Compresses data for storage","Routes traffic via AWS global network to improve performance","Provides database caching","Manages DNS resolution"], answer:1, explanation:"AWS Global Accelerator improves availability and performance by routing traffic over the AWS global network, avoiding internet congestion and reducing latency." },
  { id:19, domain:"D1", domainName:"Cloud Concepts", question:"Which AWS service enables you to create isolated virtual networks in the cloud?", options:["Amazon Route 53","Amazon VPC","AWS Direct Connect","Amazon CloudFront"], answer:1, explanation:"Amazon VPC (Virtual Private Cloud) lets you provision a logically isolated section of the AWS Cloud where you can launch resources in a virtual network you define." },
  { id:20, domain:"D1", domainName:"Cloud Concepts", question:"What is the AWS Well-Architected Framework primarily designed for?", options:["Only for security audits","Helping architects build secure, high-performing, resilient, and efficient infrastructure","Reducing cloud costs only","Replacing DevOps practices"], answer:1, explanation:"The AWS Well-Architected Framework provides architectural best practices across five pillars: operational excellence, security, reliability, performance efficiency, and cost optimization." },
  { id:21, domain:"D1", domainName:"Cloud Concepts", question:"Which pillar of the AWS Well-Architected Framework focuses on using computing resources efficiently?", options:["Reliability","Cost Optimization","Performance Efficiency","Security"], answer:2, explanation:"The Performance Efficiency pillar focuses on using computing resources efficiently to meet system requirements and maintaining that efficiency as demand changes." },
  { id:22, domain:"D1", domainName:"Cloud Concepts", question:"What does 'high availability' mean in AWS?", options:["Systems are always 100% operational","Systems are designed to minimize downtime and automatically recover from failures","Systems have no redundancy","Systems require manual intervention to recover"], answer:1, explanation:"High availability means designing systems that are operational most of the time by implementing redundancy, failover mechanisms, and automatic recovery." },
  { id:23, domain:"D1", domainName:"Cloud Concepts", question:"Which AWS service allows you to run code without provisioning or managing servers?", options:["Amazon EC2","Amazon ECS","AWS Lambda","Amazon EMR"], answer:2, explanation:"AWS Lambda is a serverless compute service that runs your code in response to events and automatically manages the underlying compute resources." },
  { id:24, domain:"D1", domainName:"Cloud Concepts", question:"What is the primary benefit of AWS Regions?", options:["Lower internet speeds","Geographic isolation for compliance and low latency","Single point of failure management","Reduced security requirements"], answer:1, explanation:"AWS Regions are separate geographic areas, providing geographic isolation for data sovereignty and compliance, as well as lower latency for users in that location." },
  { id:25, domain:"D1", domainName:"Cloud Concepts", question:"Which of the following describes 'fault tolerance'?", options:["System shuts down gracefully during failure","System continues to operate even when components fail","System sends alerts when failing","System prevents all failures"], answer:1, explanation:"Fault tolerance is the ability of a system to continue operating properly when one or more components fail, typically through redundancy and failover mechanisms." },
  { id:26, domain:"D1", domainName:"Cloud Concepts", question:"What is an AWS Edge Location used for?", options:["Running EC2 instances","Caching content for CloudFront and Route 53","Storing S3 objects","Hosting RDS databases"], answer:1, explanation:"AWS Edge Locations are endpoints used by Amazon CloudFront to cache copies of content closer to users, and by Route 53 for DNS resolution, reducing latency." },

  // ───── DOMAIN 2: Security & Compliance (34%) ─────
  { id:27, domain:"D2", domainName:"Security and Compliance", question:"Which AWS service provides centralized audit logging for all API calls made in your AWS account?", options:["Amazon CloudWatch","AWS CloudTrail","AWS Config","Amazon GuardDuty"], answer:1, explanation:"AWS CloudTrail records API calls and related events made by or on behalf of your AWS account, providing governance, compliance, and operational auditing." },
  { id:28, domain:"D2", domainName:"Security and Compliance", question:"What is AWS Identity and Access Management (IAM)?", options:["A firewall service","A service for managing user access and encryption keys","A database service","A content delivery service"], answer:1, explanation:"AWS IAM enables you to securely control access to AWS services and resources, managing users, groups, roles, and their permissions." },
  { id:29, domain:"D2", domainName:"Security and Compliance", question:"Which IAM best practice should you follow for the root account?", options:["Use it for daily tasks","Share credentials with administrators","Enable MFA and avoid using it for everyday tasks","Delete it after creating admin users"], answer:2, explanation:"AWS strongly recommends enabling MFA on the root account and not using it for everyday tasks. The root account has unrestricted access to all resources." },
  { id:30, domain:"D2", domainName:"Security and Compliance", question:"Which AWS service helps protect against DDoS attacks?", options:["AWS WAF","Amazon Inspector","AWS Shield","Amazon GuardDuty"], answer:2, explanation:"AWS Shield is a managed DDoS protection service. Shield Standard is automatic and free; Shield Advanced provides enhanced protection with 24/7 DDoS response team access." },
  { id:31, domain:"D2", domainName:"Security and Compliance", question:"What does Amazon GuardDuty do?", options:["Manages encryption keys","Provides intelligent threat detection","Blocks DDoS attacks","Manages firewall rules"], answer:1, explanation:"Amazon GuardDuty is a threat detection service that continuously monitors for malicious activity and unauthorized behavior by analyzing CloudTrail, VPC Flow Logs, and DNS logs." },
  { id:32, domain:"D2", domainName:"Security and Compliance", question:"Which principle ensures users have only the permissions required to perform their tasks?", options:["Principle of least privilege","Defense in depth","Zero trust","Separation of duties"], answer:0, explanation:"The principle of least privilege means granting only the minimum permissions necessary for users to perform their job functions, reducing the attack surface." },
  { id:33, domain:"D2", domainName:"Security and Compliance", question:"What is AWS Key Management Service (KMS)?", options:["A user management service","A managed service for creating and controlling encryption keys","A network security service","A compliance reporting tool"], answer:1, explanation:"AWS KMS makes it easy to create and manage cryptographic keys and control their use across AWS services and applications." },
  { id:34, domain:"D2", domainName:"Security and Compliance", question:"Which AWS service is a web application firewall?", options:["AWS Shield","AWS WAF","Amazon Inspector","AWS Security Hub"], answer:1, explanation:"AWS WAF (Web Application Firewall) helps protect web applications from common web exploits like SQL injection and cross-site scripting (XSS)." },
  { id:35, domain:"D2", domainName:"Security and Compliance", question:"What does Amazon Inspector do?", options:["Inspects physical AWS data centers","Automated security assessment of applications for vulnerabilities","Monitors network traffic","Manages IAM policies"], answer:1, explanation:"Amazon Inspector is an automated security assessment service that helps improve the security and compliance of applications deployed on AWS." },
  { id:36, domain:"D2", domainName:"Security and Compliance", question:"Which compliance program demonstrates AWS's commitment to security in cloud services?", options:["ISO 9001","SOC 1, SOC 2, and SOC 3","PCI DSS","All of the above"], answer:3, explanation:"AWS maintains compliance with numerous programs including SOC 1/2/3, PCI DSS, ISO 27001, HIPAA, FedRAMP, and many others, providing comprehensive compliance coverage." },
  { id:37, domain:"D2", domainName:"Security and Compliance", question:"What is the purpose of AWS Artifact?", options:["Deploy applications","Provides on-demand access to AWS compliance reports and agreements","Monitor application performance","Manage DNS records"], answer:1, explanation:"AWS Artifact is a self-service portal that provides on-demand access to AWS compliance documentation, including audit reports and compliance agreements." },
  { id:38, domain:"D2", domainName:"Security and Compliance", question:"Which feature allows you to set permissions boundaries for IAM entities?", options:["IAM Policies","Service Control Policies","Permission Boundaries","Resource-based Policies"], answer:2, explanation:"IAM Permission Boundaries set the maximum permissions an IAM entity can have, acting as a guardrail regardless of what permissions are attached to it." },
  { id:39, domain:"D2", domainName:"Security and Compliance", question:"What is AWS Security Hub used for?", options:["Physical security of AWS data centers","Centralized view of security alerts and compliance status across AWS accounts","DDoS protection","Content filtering"], answer:1, explanation:"AWS Security Hub provides a comprehensive view of security alerts and compliance status across AWS accounts, aggregating findings from multiple AWS security services." },
  { id:40, domain:"D2", domainName:"Security and Compliance", question:"Which AWS service enables encryption of data at rest in S3?", options:["AWS Shield","AWS KMS with S3 Server-Side Encryption","Amazon Inspector","AWS WAF"], answer:1, explanation:"S3 supports server-side encryption using AWS KMS (SSE-KMS), S3-managed keys (SSE-S3), or customer-provided keys (SSE-C) to encrypt data at rest." },
  { id:41, domain:"D2", domainName:"Security and Compliance", question:"What is multi-factor authentication (MFA) in AWS?", options:["Using multiple AWS accounts","An additional layer of security requiring a second form of verification","Using multiple IAM users","Encrypting data with multiple keys"], answer:1, explanation:"MFA adds an extra layer of security by requiring users to provide a second form of verification (like a code from an authenticator app) in addition to their password." },
  { id:42, domain:"D2", domainName:"Security and Compliance", question:"Which AWS service provides network-level protection by filtering inbound and outbound traffic?", options:["IAM","Security Groups and Network ACLs","AWS Shield","Amazon Inspector"], answer:1, explanation:"Security Groups act as virtual firewalls for EC2 instances, while Network ACLs control traffic at the subnet level, both filtering traffic to protect resources." },

};

function pickQuestions(total = 60) {
  const counts = { D1: Math.round(total * 0.26), D2: Math.round(total * 0.34), D3: Math.round(total * 0.34), D4: Math.round(total * 0.06) };
  counts.D4 = total - counts.D1 - counts.D2 - counts.D3; // fill remainder

  const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
  let result = [];
  for (const [domain, count] of Object.entries(counts)) {
    const pool = shuffle(ALL_QUESTIONS.filter(q => q.domain === domain));
    result = result.concat(pool.slice(0, count));
  }
  return shuffle(result).map((q, i) => ({ ...q, quizIndex: i }));
}

function formatTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = (secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// Progress Bar
function ProgressBar({ pct, color, animated = false }) {
  return (
    <div style={{ background: 'rgba(30,58,82,0.5)', borderRadius: 999, height: 10, overflow: 'hidden' }}>
      <div style={{ 
        width: `${pct}%`, height: '100%', 
        background: `linear-gradient(90deg, ${color}, ${color}cc)`,
        borderRadius: 999,
        transition: animated ? 'width 1.2s cubic-bezier(0.4,0,0.2,1)' : 'none',
        boxShadow: `0 0 8px ${color}60`
      }} />
    </div>
  );
}

// Timer Component
function Timer({ seconds, total = 3600 }) {
  const pct = seconds / total;
  const r = 28, circ = 2 * Math.PI * r;
  const dash = circ * (1 - pct);
  const isWarning = seconds < 600;
  const isDanger = seconds < 120;
  const color = isDanger ? '#EF4444' : isWarning ? '#F59E0B' : '#FF9900';

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }} className={isDanger ? 'timer-danger-pulse' : ''}>
      <div style={{ position: 'relative', width: 68, height: 68 }}>
        <svg width="68" height="68" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="34" cy="34" r={r} fill="none" stroke="rgba(30,58,82,0.8)" strokeWidth="4"/>
          <circle cx="34" cy="34" r={r} fill="none" stroke={color} strokeWidth="4"
            strokeDasharray={circ} strokeDashoffset={dash}
            strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s linear, stroke 0.5s' }}/>
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
          <span className="mono" style={{ fontSize: 13, fontWeight: 700, color, lineHeight: 1 }}>{formatTime(seconds)}</span>
        </div>
      </div>
      <div>
        <div style={{ fontSize: 11, color: '#8BA4B8', marginBottom: 2 }}>Time Left</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: isDanger ? '#EF4444' : isWarning ? '#F59E0B' : '#E8F0F7' }}>
          {isDanger ? 'Time Running Out!' : isWarning ? 'Hurry Up!' : 'In Progress'}
        </div>
      </div>
    </div>
  );
}

// Option Letter
function OptionLetter({ letter, state }) {
  const colors = { default: { bg: 'rgba(30,58,82,0.8)', color: '#8BA4B8', border: 'rgba(30,58,82,0)' }, selected: { bg: 'rgba(255,153,0,0.2)', color: '#FF9900', border: '#FF9900' }, correct: { bg: 'rgba(34,197,94,0.2)', color: '#22C55E', border: '#22C55E' }, incorrect: { bg: 'rgba(239,68,68,0.2)', color: '#EF4444', border: '#EF4444' }, correctAnswer: { bg: 'rgba(34,197,94,0.15)', color: '#22C55E', border: '#22C55E' } };
  const c = colors[state] || colors.default;
  return (
    <div style={{ width: 32, height: 32, borderRadius: 8, background: c.bg, border: `2px solid ${c.border}`, color: c.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 13, flexShrink: 0, transition: 'all 0.25s' }}>
      {letter}
    </div>
  );

// PAGE: Quiz
// ─────────────────────────────────────────────
function QuizPage({ questions, onSubmit }) {
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [flagged, setFlagged] = useState(new Set());
  const [seconds, setSeconds] = useState(3600);
  const [showSubmitModal, setShowSubmitModal] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [showExplanation, setShowExplanation] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    timerRef.current = setInterval(() => {
      setSeconds(s => {
        if (s <= 1) { clearInterval(timerRef.current); handleSubmit(); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  useEffect(() => { setShowExplanation(false); }, [current]);

  const q = questions[current];
  const answered = Object.keys(answers).length;
  const progress = (answered / questions.length) * 100;

  function handleAnswer(optIdx) {
    if (answers[q.id] !== undefined) return;
    setAnswers(prev => ({ ...prev, [q.id]: optIdx }));
  }

  function toggleFlag() {
    setFlagged(prev => {
      const next = new Set(prev);
      next.has(q.id) ? next.delete(q.id) : next.add(q.id);
      return next;
    });
  }

  function handleSubmit() {
    clearInterval(timerRef.current);
    onSubmit({ answers, questions, timeUsed: 3600 - seconds });
  }

  function getOptionState(optIdx) {
    const userAns = answers[q.id];
    if (userAns === undefined) return 'default';
    if (optIdx === q.answer) return 'correctAnswer';
    if (optIdx === userAns && userAns !== q.answer) return 'incorrect';
    return 'default';
  }

  function getOptionClass(optIdx) {
    const userAns = answers[q.id];
    if (userAns === undefined) return 'quiz-option';
    if (optIdx === q.answer) return 'quiz-option correct-answer';
    if (optIdx === userAns && userAns !== q.answer) return 'quiz-option incorrect';
    return 'quiz-option';
  }

  function getBubbleClass(qItem, idx) {
    if (idx === current) return 'q-bubble current';
    if (flagged.has(qItem.id)) return 'q-bubble flagged';
    if (answers[qItem.id] !== undefined) return 'q-bubble answered';
    return 'q-bubble unanswered';
  }

  const isAnswered = answers[q.id] !== undefined;
  const isFlagged = flagged.has(q.id);
  const cfg = DOMAIN_CONFIG[q.domain];

  return (
    <div style={{ minHeight: '100vh', background: 'var(--aws-dark)', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <header style={{ background: 'rgba(21,37,53,0.95)', borderBottom: '1px solid rgba(30,58,82,0.8)', backdropFilter: 'blur(10px)', position: 'sticky', top: 0, zIndex: 50, padding: '12px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', maxWidth: 1400, margin: '0 auto' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            <button onClick={() => setSidebarOpen(o => !o)} style={{ background: 'rgba(30,58,82,0.8)', border: '1px solid rgba(30,58,82,1)', color: '#8BA4B8', padding: '8px 10px', borderRadius: 8, cursor: 'pointer', fontSize: 16 }}>☰</button>
            <AWSLogo />
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
            {/* Progress */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 140 }}>
                <ProgressBar pct={progress} color="#FF9900" />
              </div>
              <span style={{ fontSize: 13, color: '#8BA4B8', whiteSpace: 'nowrap' }}>{answered}/{questions.length}</span>
            </div>
            <Timer seconds={seconds} />
            <button onClick={() => setShowSubmitModal(true)} style={{ background: 'linear-gradient(135deg,#FF9900,#FFB84D)', color: '#0F1923', padding: '10px 22px', border: 'none', borderRadius: 10, fontWeight: 700, cursor: 'pointer', fontSize: 14 }}>
              Submit Exam
            </button>
          </div>
        </div>
      </header>

      <div style={{ display: 'flex', flex: 1, maxWidth: 1400, margin: '0 auto', width: '100%' }}>
        {/* Sidebar */}
        {sidebarOpen && (
          <aside className="slide-in" style={{ width: 260, borderRight: '1px solid rgba(30,58,82,0.8)', padding: '20px 16px', overflowY: 'auto', maxHeight: 'calc(100vh - 73px)', position: 'sticky', top: 73, flexShrink: 0 }}>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, color: '#8BA4B8', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Question Navigator</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#8BA4B8' }}><div style={{ width: 10, height: 10, borderRadius: 3, background: '#FF9900' }} /> Answered</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#8BA4B8' }}><div style={{ width: 10, height: 10, borderRadius: 3, background: '#F59E0B' }} /> Flagged</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#8BA4B8' }}><div style={{ width: 10, height: 10, borderRadius: 3, background: '#1E3A52' }} /> Not answered</div>
              </div>
            </div>

            {/* Domain sections */}
            {Object.entries(DOMAIN_CONFIG).map(([domain, cfg]) => {
              const domainQs = questions.map((q, i) => ({ ...q, idx: i })).filter(q => q.domain === domain);
              if (!domainQs.length) return null;
              return (
                <div key={domain} style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: cfg.color, marginBottom: 8, fontWeight: 600, display: 'flex', justifyContent: 'space-between' }}>
                    <span>{cfg.short}</span>
                    <span style={{ color: '#5A7A94' }}>{domainQs.filter(q => answers[q.id] !== undefined).length}/{domainQs.length}</span>
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                    {domainQs.map(qItem => (
                      <div key={qItem.id} className={getBubbleClass(qItem, qItem.idx)} onClick={() => setCurrent(qItem.idx)}>
                        {qItem.idx + 1}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}

            <button onClick={() => setShowSubmitModal(true)} style={{ width: '100%', background: 'rgba(255,153,0,0.1)', border: '1px solid rgba(255,153,0,0.3)', color: '#FF9900', padding: '12px', borderRadius: 10, fontWeight: 600, cursor: 'pointer', marginTop: 8, fontSize: 14 }}>
              Submit Exam
            </button>
          </aside>
        )}

        {/* Main */}
        <main style={{ flex: 1, padding: '28px 36px', overflowY: 'auto' }}>
          <div style={{ maxWidth: 760 }} className="fade-in" key={current}>
            {/* Question header */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ fontSize: 13, color: '#8BA4B8', fontWeight: 500 }}>Question {current + 1} of {questions.length}</span>
                <DomainBadge domain={q.domain} />
              </div>
              <button onClick={toggleFlag} style={{ background: isFlagged ? 'rgba(245,158,11,0.15)' : 'rgba(30,58,82,0.5)', border: `1px solid ${isFlagged ? 'rgba(245,158,11,0.4)' : 'rgba(30,58,82,0.8)'}`, color: isFlagged ? '#F59E0B' : '#8BA4B8', padding: '7px 14px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6 }}>
                {isFlagged ? '🚩 Flagged' : '⚑ Flag for Review'}
              </button>
            </div>

            {/* Question box */}
            <div style={{ background: 'rgba(26,47,69,0.5)', border: '1px solid rgba(30,58,82,0.8)', borderRadius: 16, padding: '28px 28px', marginBottom: 20 }}>
              <p style={{ fontSize: 17, lineHeight: 1.75, margin: 0, fontWeight: 500, color: '#E8F0F7' }}>{q.question}</p>
            </div>

            {/* Options */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>
              {q.options.map((opt, i) => {
                const state = getOptionState(i);
                const letters = ['A', 'B', 'C', 'D'];
                return (
                  <div key={i} className={getOptionClass(i) + (answers[q.id] !== undefined ? ' answered' : '')} onClick={() => handleAnswer(i)} style={{ display: 'flex', alignItems: 'flex-start', gap: 14, padding: '16px 18px' }}>
                    <OptionLetter letter={letters[i]} state={state} />
                    <span style={{ fontSize: 15, lineHeight: 1.6, color: state === 'default' ? '#C8D8E8' : state === 'correctAnswer' ? '#4ADE80' : state === 'incorrect' ? '#F87171' : '#C8D8E8', paddingTop: 4 }}>
                      {opt}
                    </span>
                    {state === 'correctAnswer' && <span style={{ marginLeft: 'auto', color: '#22C55E', fontSize: 18, flexShrink: 0 }}>✓</span>}
                    {state === 'incorrect' && <span style={{ marginLeft: 'auto', color: '#EF4444', fontSize: 18, flexShrink: 0 }}>✗</span>}
                  </div>
                );
              })}
            </div>

            {/* Explanation */}
            {isAnswered && (
              <div className="fade-in">
                {!showExplanation ? (
                  <button onClick={() => setShowExplanation(true)} style={{ background: 'rgba(0,168,225,0.1)', border: '1px solid rgba(0,168,225,0.3)', color: '#00A8E1', padding: '10px 20px', borderRadius: 8, cursor: 'pointer', fontWeight: 600, fontSize: 14 }}>
                    💡 Show Explanation
                  </button>
                ) : (
                  <div className="explanation-box fade-in" style={{ padding: '16px 20px' }}>
                    <div style={{ fontSize: 12, color: '#00A8E1', fontWeight: 700, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Explanation</div>
                    <p style={{ fontSize: 14, lineHeight: 1.7, color: '#C8D8E8', margin: 0 }}>{q.explanation}</p>
                  </div>
                )}
              </div>
            )}

            {/* Nav buttons */}
            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 28 }}>
              <button onClick={() => setCurrent(c => Math.max(0, c - 1))} disabled={current === 0} style={{ background: current === 0 ? 'rgba(30,58,82,0.3)' : 'rgba(30,58,82,0.8)', border: '1px solid rgba(30,58,82,0.8)', color: current === 0 ? '#3A5A72' : '#8BA4B8', padding: '12px 24px', borderRadius: 10, cursor: current === 0 ? 'not-allowed' : 'pointer', fontWeight: 600, fontSize: 14 }}>
                ← Previous
              </button>
              <div style={{ display: 'flex', gap: 10 }}>
                {current < questions.length - 1 ? (
                  <button onClick={() => setCurrent(c => c + 1)} style={{ background: 'rgba(255,153,0,0.15)', border: '1px solid rgba(255,153,0,0.4)', color: '#FF9900', padding: '12px 24px', borderRadius: 10, cursor: 'pointer', fontWeight: 600, fontSize: 14 }}>

                    Submit Exam 🏁
                  </button>
                )}
              </div>
            </div>
          </div>
        </main>

            <p style={{ color: '#8BA4B8', marginBottom: 8, lineHeight: 1.6 }}>You've answered <strong style={{ color: '#FF9900' }}>{answered}</strong> of <strong style={{ color: '#FF9900' }}>{questions.length}</strong> questions.</p>

            <div style={{ display: 'flex', gap: 12 }}>
              <button onClick={() => setShowSubmitModal(false)} style={{ flex: 1, background: 'rgba(30,58,82,0.8)', border: '1px solid rgba(30,58,82,1)', color: '#8BA4B8', padding: '13px', borderRadius: 10, cursor: 'pointer', fontWeight: 600 }}>Keep Reviewing</button>
              <button onClick={handleSubmit} style={{ flex: 1, background: 'linear-gradient(135deg,#FF9900,#FFB84D)', color: '#0F1923', padding: '13px', border: 'none', borderRadius: 10, cursor: 'pointer', fontWeight: 700 }}>Submit Now</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// PAGE: Results
// ─────────────────────────────────────────────
function ResultsPage({ result, onRetry }) {
  const [activeTab, setActiveTab] = useState('results');
  const [reviewFilter, setReviewFilter] = useState('all');
  const [expandedQ, setExpandedQ] = useState(null);

  const { answers, questions, timeUsed } = result;

  // Scoring
  const totalCorrect = questions.filter(q => answers[q.id] === q.answer).length;
  const totalScore = Math.round((totalCorrect / questions.length) * 1000);
  const passed = totalScore >= 700;
  const pctCorrect = Math.round((totalCorrect / questions.length) * 100);

  const domainStats = Object.entries(DOMAIN_CONFIG).map(([domain, cfg]) => {
    const qs = questions.filter(q => q.domain === domain);
    const correct = qs.filter(q => answers[q.id] === q.answer).length;
    return { domain, cfg, total: qs.length, correct, pct: qs.length > 0 ? Math.round((correct / qs.length) * 100) : 0 };
  }).filter(d => d.total > 0);

  const filteredReview = questions.filter(q => {
    if (reviewFilter === 'correct') return answers[q.id] === q.answer;
    if (reviewFilter === 'incorrect') return answers[q.id] !== q.answer;
    if (reviewFilter === 'unanswered') return answers[q.id] === undefined;
    return true;
  });

  const correctCount = questions.filter(q => answers[q.id] === q.answer).length;
  const incorrectCount = questions.filter(q => answers[q.id] !== undefined && answers[q.id] !== q.answer).length;
  const unansweredCount = questions.filter(q => answers[q.id] === undefined).length;

  return (
    <div style={{ minHeight: '100vh', background: 'var(--aws-dark)' }}>
      {/* Header */}
      <header style={{ background: 'rgba(21,37,53,0.95)', borderBottom: '1px solid rgba(30,58,82,0.8)', padding: '16px 32px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <AWSLogo />
        <button onClick={onRetry} style={{ background: 'linear-gradient(135deg,#FF9900,#FFB84D)', color: '#0F1923', padding: '10px 22px', border: 'none', borderRadius: 10, fontWeight: 700, cursor: 'pointer', fontSize: 14 }}>
          🔄 New Practice Exam
        </button>
      </header>

      <div style={{ maxWidth: 960, margin: '0 auto', padding: '40px 24px' }}>
        {/* Score Hero */}
        <div className="bounce-in" style={{ textAlign: 'center', marginBottom: 48 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 140, height: 140, borderRadius: '50%', background: `conic-gradient(${passed ? '#22C55E' : '#EF4444'} ${pctCorrect * 3.6}deg, rgba(30,58,82,0.5) 0deg)`, marginBottom: 24, position: 'relative' }}>
            <div style={{ width: 110, height: 110, borderRadius: '50%', background: '#152535', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
              <span style={{ fontSize: 32, fontWeight: 800, color: passed ? '#22C55E' : '#EF4444' }}>{pctCorrect}%</span>
              <span style={{ fontSize: 11, color: '#8BA4B8' }}>Correct</span>
            </div>
          </div>

          <h1 style={{ fontSize: 38, fontWeight: 800, letterSpacing: '-1px', marginBottom: 8 }}>
            {passed ? '🎉 Congratulations!' : '📚 Keep Practicing!'}
          </h1>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, background: passed ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)', border: `1px solid ${passed ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)'}`, borderRadius: 30, padding: '10px 24px', marginBottom: 24 }}>
            <span style={{ fontSize: 20, fontWeight: 800, color: passed ? '#22C55E' : '#EF4444' }}>{totalScore}/1000</span>
            <span style={{ fontSize: 14, color: '#8BA4B8' }}>Score • {passed ? 'PASS ✓' : 'Did not pass'}</span>
          </div>
          <p style={{ color: '#8BA4B8', fontSize: 15 }}>
            {totalCorrect} correct out of {questions.length} questions • Time used: {formatTime(timeUsed)}
          </p>
        </div>

        {/* Quick Stats */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 32 }}>
          {[
            { label: 'Correct', value: correctCount, color: '#22C55E', bg: 'rgba(34,197,94,0.08)' },
            { label: 'Incorrect', value: incorrectCount, color: '#EF4444', bg: 'rgba(239,68,68,0.08)' },
            { label: 'Unanswered', value: unansweredCount, color: '#F59E0B', bg: 'rgba(245,158,11,0.08)' },
          ].map((s, i) => (
            <div key={i} style={{ background: s.bg, border: `1px solid ${s.color}30`, borderRadius: 14, padding: '20px', textAlign: 'center' }}>
              <div style={{ fontSize: 36, fontWeight: 800, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 13, color: '#8BA4B8', marginTop: 4 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{ display: 'flex', borderBottom: '1px solid rgba(30,58,82,0.8)', marginBottom: 32 }}>
          {[['results', '📊 Score by Domain'], ['review', '📋 Review Answers']].map(([tab, label]) => (
            <button key={tab} className={`result-tab ${activeTab === tab ? 'active' : 'inactive'}`} onClick={() => setActiveTab(tab)} style={{ background: 'none', border: 'none', marginRight: 4 }}>
              {label}
            </button>
          ))}
        </div>

        {/* Tab: Results */}
        {activeTab === 'results' && (
          <div className="fade-in">
            <h3 style={{ fontSize: 18, fontWeight: 700, marginBottom: 24 }}>Performance by Domain</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {domainStats.map(({ domain, cfg, total, correct, pct }) => (
                <div key={domain} style={{ background: 'rgba(26,47,69,0.4)', border: '1px solid rgba(30,58,82,0.8)', borderRadius: 14, padding: '20px 24px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
                    <div>
                      <DomainBadge domain={domain} />
                      <div style={{ fontSize: 15, fontWeight: 700, color: '#E8F0F7', marginTop: 6 }}>{cfg.name}</div>
                      <div style={{ fontSize: 13, color: '#8BA4B8', marginTop: 2 }}>Exam weight: {cfg.pct}%</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 28, fontWeight: 800, color: pct >= 70 ? '#22C55E' : pct >= 50 ? '#F59E0B' : '#EF4444' }}>{pct}%</div>
                      <div style={{ fontSize: 13, color: '#8BA4B8' }}>{correct}/{total} correct</div>
                    </div>
                  </div>
                  <ProgressBar pct={pct} color={pct >= 70 ? '#22C55E' : pct >= 50 ? '#F59E0B' : '#EF4444'} animated />
                  {pct < 70 && (
                    <div style={{ marginTop: 10, fontSize: 12, color: '#F59E0B', display: 'flex', alignItems: 'center', gap: 5 }}>
                      ⚠️ Below passing threshold for this domain. Focus study here.
                    </div>
                  )}
                </div>
              ))}
            </div>

            <div style={{ marginTop: 28, background: 'rgba(26,47,69,0.4)', border: '1px solid rgba(30,58,82,0.8)', borderRadius: 14, padding: '20px 24px' }}>
              <h4 style={{ fontSize: 15, fontWeight: 700, marginBottom: 14, color: '#FF9900' }}>📌 Recommended Next Steps</h4>
              {domainStats.filter(d => d.pct < 70).length === 0 ? (
                <p style={{ color: '#8BA4B8', fontSize: 14, lineHeight: 1.6 }}>Excellent work across all domains! Schedule your AWS exam at <a href="https://aws.amazon.com/certification/" target="_blank" style={{ color: '#00A8E1' }}>aws.amazon.com/certification</a>.</p>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {domainStats.filter(d => d.pct < 70).map(d => (
                    <div key={d.domain} style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, color: '#C8D8E8' }}>
                      <span style={{ color: d.cfg.color }}>●</span>
                      Review <strong>{d.cfg.name}</strong> — you scored {d.pct}% (need 70%+)
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div style={{ textAlign: 'center', marginTop: 32 }}>
              <button onClick={onRetry} style={{ background: 'linear-gradient(135deg,#FF9900,#FFB84D)', color: '#0F1923', padding: '16px 48px', border: 'none', borderRadius: 12, fontWeight: 700, cursor: 'pointer', fontSize: 16 }}>
                🔄 Start New Practice Exam
              </button>
            </div>
          </div>
        )}

        {/* Tab: Review */}
        {activeTab === 'review' && (
          <div className="fade-in">
            {/* Filter */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
              {[['all','All Questions'], ['correct','✓ Correct'], ['incorrect','✗ Incorrect'], ['unanswered','○ Unanswered']].map(([f, label]) => (
                <button key={f} onClick={() => setReviewFilter(f)} style={{ background: reviewFilter === f ? 'rgba(255,153,0,0.15)' : 'rgba(30,58,82,0.5)', border: `1px solid ${reviewFilter === f ? 'rgba(255,153,0,0.4)' : 'rgba(30,58,82,0.8)'}`, color: reviewFilter === f ? '#FF9900' : '#8BA4B8', padding: '8px 16px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>
                  {label}
                </button>
              ))}
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {filteredReview.map((q, qIdx) => {
                const userAns = answers[q.id];
                const isCorrect = userAns === q.answer;
                const isUnanswered = userAns === undefined;
                const letters = ['A', 'B', 'C', 'D'];
                const isExpanded = expandedQ === q.id;

                return (
                  <div key={q.id} className="review-card" style={{ overflow: 'hidden' }}>
                    <div onClick={() => setExpandedQ(isExpanded ? null : q.id)} style={{ cursor: 'pointer', padding: '18px 20px', display: 'flex', alignItems: 'flex-start', gap: 14 }}>
                      <div style={{ width: 32, height: 32, borderRadius: 8, background: isUnanswered ? 'rgba(245,158,11,0.15)' : isCorrect ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)', color: isUnanswered ? '#F59E0B' : isCorrect ? '#22C55E' : '#EF4444', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 700, flexShrink: 0 }}>
                        {isUnanswered ? '?' : isCorrect ? '✓' : '✗'}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 12, color: '#8BA4B8' }}>Q{questions.indexOf(q) + 1}</span>
                          <DomainBadge domain={q.domain} />
                        </div>
                        <p style={{ fontSize: 14, color: '#C8D8E8', lineHeight: 1.6, margin: 0 }}>{q.question}</p>
                      </div>
                      <span style={{ color: '#5A7A94', fontSize: 16, flexShrink: 0 }}>{isExpanded ? '▲' : '▼'}</span>
                    </div>

                    {isExpanded && (
                      <div className="fade-in" style={{ borderTop: '1px solid rgba(30,58,82,0.6)', padding: '16px 20px', paddingLeft: 66 }}>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
                          {q.options.map((opt, i) => {
                            const isUserChoice = i === userAns;
                            const isRightAns = i === q.answer;
                            return (
                              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 8, background: isRightAns ? 'rgba(34,197,94,0.08)' : isUserChoice && !isRightAns ? 'rgba(239,68,68,0.08)' : 'transparent', border: `1px solid ${isRightAns ? 'rgba(34,197,94,0.3)' : isUserChoice && !isRightAns ? 'rgba(239,68,68,0.25)' : 'rgba(30,58,82,0.5)'}` }}>
                                <span style={{ fontWeight: 700, fontSize: 13, color: isRightAns ? '#4ADE80' : isUserChoice ? '#F87171' : '#5A7A94', minWidth: 20 }}>{letters[i]}.</span>
                                <span style={{ fontSize: 14, color: isRightAns ? '#4ADE80' : isUserChoice && !isRightAns ? '#F87171' : '#8BA4B8', flex: 1 }}>{opt}</span>
                                {isRightAns && <span style={{ color: '#22C55E' }}>✓</span>}
                                {isUserChoice && !isRightAns && <span style={{ color: '#EF4444' }}>✗</span>}
                              </div>
                            );
                          })}
                        </div>
                        <div className="explanation-box" style={{ padding: '12px 16px' }}>
                          <div style={{ fontSize: 11, color: '#00A8E1', fontWeight: 700, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Explanation</div>
                          <p style={{ fontSize: 13, color: '#C8D8E8', lineHeight: 1.7, margin: 0 }}>{q.explanation}</p>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP ROOT
// ─────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('landing');
  const [questions, setQuestions] = useState([]);
  const [result, setResult] = useState(null);

  function startQuiz() {
    setQuestions(pickQuestions(60));
    setPage('quiz');
    window.scrollTo(0, 0);
  }

  function handleSubmit(r) {
    setResult(r);
    setPage('results');
    window.scrollTo(0, 0);
  }

  function handleRetry() {
    setResult(null);
    setPage('landing');
    window.scrollTo(0, 0);
  }

  if (page === 'landing') return <LandingPage onStart={startQuiz} />;
  if (page === 'quiz') return <QuizPage questions={questions} onSubmit={handleSubmit} />;
  if (page === 'results') return <ResultsPage result={result} onRetry={handleRetry} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
